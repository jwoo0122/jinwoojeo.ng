name: Check

on:
  pull_request:
    branches: [main]

jobs:
  convert:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: corepack enable

      - name: Install
        run: pnpm install

      - name: Convert all posts
        run: node convert.mjs --all

      - name: Verify generated HTML
        run: |
          for slug in 1902190 1910170 2002220 2004050 2009050 2012130 2102030 2302090 2312250 2404120 260130 260304; do
            if [ ! -f "posts/$slug/index.html" ]; then
              echo "Missing: posts/$slug/index.html"
              exit 1
            fi
          done
          echo "All 12 post HTML files present"
